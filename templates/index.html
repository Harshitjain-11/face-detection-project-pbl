<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaceVault — Smart Face Recognition</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="particles-js"></div>

  <div class="app-shell">

    <!-- ── Header ── -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">FaceVault</span>
      </div>
      <nav class="app-nav">
        <a href="/" class="nav-link active">Capture</a>
        <a href="/gallery" class="nav-link">Gallery</a>
        <a href="/live" class="nav-link">Live Detection</a>
      </nav>
    </header>

    <!-- ── Main ── -->
    <main class="main-content">

      <!-- Camera panel (left / top on mobile) -->
      <section class="panel video-panel">
        <div class="panel-header">
          <h2 class="panel-title">Camera Feed</h2>
          <div class="status-dot" id="camStatus"></div>
        </div>

        <div class="video-wrapper">
          <div class="video-placeholder" id="videoPlaceholder">
            <div class="placeholder-icon">◉</div>
            <p>Camera is off</p>
            <p class="placeholder-sub">Click "Start Camera" to begin</p>
          </div>
          <img id="videoFeed" src="" alt="Live feed" />
        </div>

        <div class="panel-actions">
          <button class="btn btn-primary" id="startBtn">▶ Start Camera</button>
          <button class="btn btn-danger" id="stopBtn" style="display:none;">■ Stop Camera</button>
        </div>
      </section>

      <!-- Control panel (right / bottom on mobile) -->
      <section class="panel control-panel">

        <!-- Enrolment form -->
        <div class="panel-header">
          <h2 class="panel-title">Face Enrolment</h2>
        </div>

        <form id="captureForm" class="capture-form">
          <label class="field-label" for="name">Person Name</label>
          <input type="text" id="name" placeholder="e.g. Jane Smith" autocomplete="off" maxlength="50" required />
          <div class="form-actions">
            <button type="submit" class="btn btn-secondary">📷 Capture Frame</button>
            <button type="button" class="btn btn-outline" id="autoCaptureBtn">🔁 Auto (10)</button>
          </div>
        </form>

        <div class="divider"></div>

        <!-- Train model -->
        <div class="train-section">
          <p class="section-hint">
            After capturing images for each person, train the model to enable recognition.
            Each person needs at least 2 captured frames.
          </p>
          <button class="btn btn-accent" id="trainBtn">🧠 Train Recognition Model</button>
        </div>

        <!-- Status message -->
        <div id="msg" class="status-msg"></div>

        <!-- Progress bar (auto-capture) -->
        <div class="progress-wrap" id="progressWrap" style="display:none;">
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressBarFill"></div>
          </div>
          <span class="progress-text" id="progressText"></span>
        </div>

      </section>
    </main>

  </div><!-- /.app-shell -->

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="/static/js/main.js"></script>
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 55 },
        shape: { type: "circle" },
        size: { value: 2, random: true },
        color: { value: "#3b82f6" },
        opacity: { value: 0.3 },
        move: { speed: 1.1, direction: "none", out_mode: "out" },
        line_linked: { enable: true, distance: 130, color: "#60a5fa", opacity: 0.18, width: 1 }
      },
      interactivity: {
        events: { onhover: { enable: true, mode: "repulse" } },
        modes: { repulse: { distance: 80, duration: 0.4 } }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
