    <div>
      <button id="startBtn">Start Webcam</button>
      <button id="stopBtn" style="display:none;">Stop Webcam</button>
    </div>
    <div id="videoBox" style="display:none;">

  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 80 },
        shape: { type: "circle" },
        size: { value: 3 },
        color: { value: "#3b82f6" }, // blue accent for modern look
        opacity: { value: 0.45 },
        move: { speed: 1.5, direction: "none", out_mode: "out" },
        line_linked: {
          enable: true,
          distance: 120,
          color: "#60a5fa",
          opacity: 0.25,
          width: 1
        }
      },
      interactivity: {
        events: { onhover: { enable: true, mode: "repulse" } },
        modes: {
          repulse: {
            distance: 80,
            duration: 0.4
          }
        }
      },
      retina_detect: true,
    });
  </script>
</body>
</html>
